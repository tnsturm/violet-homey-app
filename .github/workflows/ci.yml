# CI fuer die Violet Homey App (M4.6 — spec
# docs/superpowers/specs/2026-07-08-m4.6-loop-hardening-gates-ci.md §5):
# spiegelt die lokalen Gates sessionunabhaengig — npm test (test-gate),
# npm run typecheck (typecheck-gate), Manifest-Sync (check-version-sync)
# und validate --level publish. validate laeuft ohne Homey-Login (CLI 4.1.1:
# App.validate ist rein lokal via homey-lib; Login nur fuer run/install/publish).
# Der nightly Cron ist der Heartbeat auf main (Default-Branch).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  ci:
    name: Test + Typecheck + Validate
    runs-on: ubuntu-latest
    # Der Gesamtlauf dauert ~30 s. Ohne Limit laeuft ein haengender Schritt bis zum
    # 6-h-Default-Timeout (2026-07-20: sechs Laeufe je 6 h durch einen geleakten
    # NOTIFY-Listener-Handle, siehe docs/dashboard/triage-inbox.md). 10 min sind
    # grosszuegig fuer den Normalfall und machen einen Hang binnen Minuten sichtbar.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          # 22 (LTS), nicht 18: der Node-18-Test-Runner haengt bei parallelem
          # Gesamtlauf dieser Suite (reproduziert lokal: einzeln alle gruen,
          # `node --test` gesamt haengt vor der ersten Datei; 18 ist zudem EOL).
          node-version: 22
          cache: npm
      # --ignore-scripts (M5.9 Spec §5, SR-07): keine Lifecycle-Skripte beim
      # Install — die devDeps (Typen + tsc) brauchen keine; entschaerft
      # kompromittierte Pakete zur Installzeit.
      - run: npm ci --ignore-scripts
      - name: Audit (bekannte Schwachstellen — blockt vor Publish)
        # Enforced die Sicherheitshaelfte von Option 1: bricht ab bei high/critical
        # Advisories in den (dev-)Dependencies, bevor ein Release rausgeht.
        run: npm audit --audit-level=high
      - run: npm test
      - run: npm run typecheck
      - name: Manifest sync (app.json == .homeycompose/app.json)
        # Block scalar: the JS contains ": " sequences that are invalid in a YAML plain scalar.
        run: >-
          node -e "const a=require('./app.json').version, b=require('./.homeycompose/app.json').version;
          if (a !== b) { console.error('Version mismatch: app.json=' + a + ' vs .homeycompose/app.json=' + b); process.exit(1); }
          console.log('manifest versions in sync: ' + a);"
      - name: Validate (publish level)
        run: npx --yes homey app validate --level publish
